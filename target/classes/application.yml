spring:
  application:
    name: "sistema_reservas"

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dawiapp}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mysql}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true

  sql:
    init:
      encoding: UTF-8
      mode: always

  output:
    ansi:
      enabled: always

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:dev-secret-key-9a8b7c6d5e4f3g2h1i0j9k8l7m6n5o4p}
      expiration: 3600000

mercadopago:
  access-token: TEST-7991409710727683-040222-5bc62e523c6ead7892a8006d8fe0cdf4-3310339441

