spring:
  profiles:
    active: dev

  application:
    name: "sistema_reservas"

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 16

  output:
    ansi:
      enabled: always

  sql:
    init:
      encoding: UTF-8

application:
  security:
    jwt:
      expiration: 130
      refresh-expiration: 300
