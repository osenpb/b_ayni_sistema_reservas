spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dawiapp}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mysql}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:dev-secret-key-9a8b7c6d5e4f3g2h1i0j9k8l7m6n5o4p}
